; PlatformIO Project Configuration File for Hexadrone ESP32

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; --- Serial Monitor ---
monitor_speed = 115200
monitor_echo = yes
monitor_filters = send_on_enter

; --- Build Options ---
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
build_unflags = 
    -std=gnu++11
build_flags =
    -I include
    -std=gnu++17

; --- Dependencies ---
lib_ldf_mode = deep+
lib_ignore = WebServer
lib_deps =
    symlink://../hexadrone_core
    AlfredoSystems/AlfredoCRSF @ 1.0.1
    RobTillaart/INA228 @ 0.4.1
    adafruit/Adafruit PWM Servo Driver Library @ 3.0.1
    mathieucarbou/ESPAsyncWebServer @ 3.3.2
    
    ; Built-in libraries
    Wire
    LittleFS

; --- Wireless OTA Upload ---
upload_speed = 921600
upload_flags =
    --port=3232

;upload_port = 10.46.34.101
;upload_protocol = espota
; Backup Serial Upload:
upload_protocol = esptool
