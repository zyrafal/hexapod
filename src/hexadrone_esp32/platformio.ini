; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


; PlatformIO Project Configuration File for Hexadrone ESP32
; Located in: hexadrone_ws/src/hexadrone_esp32/

[platformio]
lib_extra_dirs = ../ 

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

board_build.filesystem = littlefs

build_flags =
    -I include

lib_deps =
    symlink://../hexadrone_core
    AlfredoSystems/AlfredoCRSF @ 1.0.1
    RobTillaart/INA228 @ 0.4.1
    adafruit/Adafruit PWM Servo Driver Library @ 3.0.1
    mathieucarbou/ESPAsyncWebServer @ 3.3.2

    ; Built-in libraries (These don't need versions as they are part of the ESP32 Core)
    Wire
    LittleFS

lib_ldf_mode = deep+
lib_ignore = WebServer
